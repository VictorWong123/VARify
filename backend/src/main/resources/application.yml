spring:
  application:
    name: varify-backend
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

server:
  max-http-request-header-size: 65536

varify:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
  gmi:
    api-key: ${GMI_API_KEY:}
    base-url: ${GMI_BASE_URL:https://api.gmi-serving.com}
    model: ${GMI_MODEL:}
